server {
    listen       5001;
    listen  [::]:5001;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — anchor links today, but cheap insurance if we ever add a router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames under /assets/* — safe to cache forever.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache the entry HTML — it's small and references the hashed bundles.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Reasonable defaults
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
